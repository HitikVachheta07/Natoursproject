name: Deploy Natours App to AWS EC2

on:
  push:
    branches:
      - main   # change if your branch is different

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📦 Pulling latest code..."
            cd ~/natours || git clone https://github.com/HitikVachheta07/Natoursproject.git ~/natours
            cd ~/natours
            git pull origin main 

            echo "📦 Installing dependencies..."
            npm install

            echo "🔄 Restarting app with PM2..."
            pm2 restart natours || pm2 start server.js --name natours

            echo "✅ Deployment successful!"
